name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # إعداد نظام أندرويد الرسمي داخل السيرفر وقبول تراخيصه مسبقاً بشكل قاطع
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install cython virtualenv flet buildozer

    - name: Configure Buildozer Spec
      run: |
        # تنظيف أي مخلفات قديمة تالفة تماماً
        rm -rf .buildozer/
        rm -rf ~/.buildozer/
        
        if [ -f "buildozer.spec" ]; then
          # فرض بايثون المستقرة وتفعيل الصلاحيات والأيقونة
          sed -i 's/python3 == 3.14/python3 == 3.11/g' buildozer.spec
          sed -i 's/#python3 == 3.11/python3 == 3.11/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,INTERNET/g' buildozer.spec
          sed -i 's/#icon.filename = .\/icon.png/icon.filename = icon.png/g' buildozer.spec
          sed -i 's/icon.filename = .\/data\/icon.png/icon.filename = icon.png/g' buildozer.spec
        fi

    - name: Force Accept All Android Licenses
      run: |
        # قبول جماعي وصارم لكافة تراخيص الأندرويد في كل المسارات الممكنة
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        yes | sdkmanager --licenses || true
        
        # إعلام بيلدوزر بأننا وافقنا على التراخيص مسبقاً عبر متغيرات البيئة
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export AUTO_ACCEPT_ANDROID_SDK_LICENSES=1

    - name: Build APK with Buildozer
      run: |
        # تمرير متغيرات البيئة لداخل أمر بيلدوزر لقطع الطريق على أي نافذة تظهر له
        export BUILDOZER_WARN_ON_ROOT=0
        export AUTO_ACCEPT_ANDROID_SDK_LICENSES=1
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Final-Ultimate-APK
        path: bin/*.apk
