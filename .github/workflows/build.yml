name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install cython virtualenv flet buildozer

    - name: Prepare Buildozer Directory & Accept Licenses
      run: |
        # تشغيل بناء مبدئي خفيف جداً لإنشاء المجلدات والـ SDK
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android status || true
        
        # الآن نضمن قبول التراخيص في المجلد الفعلي الذي أنشأه بيلدوزر
        if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
        fi

    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        # تشغيل البناء مع تفعيل خيار القبول التلقائي الداخلي للتراخيص
        buildozer android release
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Generator-APK
        path: bin/*.apk
