name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        pip install --upgrade pip
        pip install cython virtualenv flet buildozer

    - name: Clean and Configure Buildozer Spec
      run: |
        # مسح أي مخلفات قديمة داخل السيرفر للتأكد من النقاء الكامل
        rm -rf .buildozer/
        rm -rf ~/.buildozer/
        
        if [ -f "buildozer.spec" ]; then
          # إجبار التعديل على بايثون 3.11 المستقرة وحذف أي إشارة لـ 3.14
          sed -i 's/python3 == 3.14/python3 == 3.11/g' buildozer.spec
          sed -i 's/#python3 == 3.11/python3 == 3.11/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,INTERNET/g' buildozer.spec
          sed -i 's/#icon.filename = .\/icon.png/icon.filename = icon.png/g' buildozer.spec
          sed -i 's/icon.filename = .\/data\/icon.png/icon.filename = icon.png/g' buildozer.spec
        fi

    - name: Force Accept Buildozer SDK Licenses
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android status || true
        
        if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161ad4178b1185d1a37fbf41ea5269c55\nd56f174dd047f074b284505391a45109074b4095\n24333f1a61b68a41b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd\n35dbf9750e6d5147eeaa343fe4260020bc32ede6" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        fi

    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Clean-Build-APK
        path: bin/*.apk
