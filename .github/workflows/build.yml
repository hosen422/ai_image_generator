name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. التخزين المؤقت لضمان السرعة
    - name: Cache Buildozer packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    # 2. تثبيت جافا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. تثبيت بايثون 3.10 المستقرة
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. تثبيت متطلبات النظام
    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev clang
        pip install --upgrade pip
        pip install cython virtualenv flet buildozer

    # 5. ضبط إعدادات ملف buildozer
    - name: Configure Buildozer Spec
      run: |
        if [ -f "buildozer.spec" ]; then
          sed -i 's/python3 == 3.14/python3 == 3.11/g' buildozer.spec
          sed -i 's/#python3 == 3.11/python3 == 3.11/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,INTERNET/g' buildozer.spec
          sed -i 's/#icon.filename = .\/icon.png/icon.filename = icon.png/g' buildozer.spec
          sed -i 's/icon.filename = .\/data\/icon.png/icon.filename = icon.png/g' buildozer.spec
        fi

    # 6. الخدعة الكبرى: حل معضلة مسار sdkmanager وتهيئة التراخيص مسبقاً
    - name: Pre-Accept Android SDK Licenses & Fix SDK Path
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # إنشاء المجلدات المتوقعة لبيلدوزر وحقن التراخيص مسبقاً
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161ad4178b1185d1a37fbf41ea5269c55\nd56f174dd047f074b284505391a45109074b4095\n24333f1a61b68a41b1185d1a37fbf41ea5269c55\n84831b9409646a918e30573bab4c9c91346d8abd\n35dbf9750e6d5147eeaa343fe4260020bc32ede6" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # إجبار السيرفر على محاكاة المسار القديم الذي يبحث عنه بيلدوزر لـ sdkmanager
        if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        fi

    # 7. إطلاق البناء المباشر
    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    # 8. رفع الملف الناتج
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Final-APK
        path: bin/*.apk
