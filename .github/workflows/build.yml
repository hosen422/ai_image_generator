name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. تنظيف أي مخلفات محلياً داخل السيرفر قبل أي خطوة
    - name: Clean workspace
      run: |
        rm -rf .buildozer
        rm -rf bin

    # 2. كاش نقي وجديد تماماً (تغيير المفتاح لتفادي الكاش المكسور السابق)
    - name: Cache Buildozer packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-v2-

    # 3. تثبيت جافا 17 الرسمية
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4. تثبيت بايثون 3.10 المستقرة لبيلدوزر
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 5. تثبيت متطلبات النظام والأدوات المساعدة
    - name: Install Android Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev clang
        pip install --upgrade pip
        pip install cython virtualenv flet buildozer

    # 6. ضبط مواصفات buildozer وإصدار بايثون الخاص بـ Flet
    - name: Configure Buildozer Spec
      run: |
        if [ -f "buildozer.spec" ]; then
          sed -i 's/python3 == 3.14/python3 == 3.11/g' buildozer.spec
          sed -i 's/#python3 == 3.11/python3 == 3.11/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,INTERNET/g' buildozer.spec
          sed -i 's/#icon.filename = .\/icon.png/icon.filename = icon.png/g' buildozer.spec
          sed -i 's/icon.filename = .\/data\/icon.png/icon.filename = icon.png/g' buildozer.spec
        fi

    # 7. تهيئة وقبول تراخيص أندرويد تلقائياً في البيئة النظيفة
    - name: Pre-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        fi

    # 8. إطلاق البناء المباشر والمعزول
    - name: Build APK with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    # 9. رفع الملف الناتج عند النجاح
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Final-APK
        path: bin/*.apk
