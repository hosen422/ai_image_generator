name: Build AI App APK
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # تهيئة مواصفات ملف buildozer تلقائياً قبل البناء لضمان الإعدادات الصحيحة
    - name: Configure Buildozer Spec
      run: |
        if [ -f "buildozer.spec" ]; then
          sed -i 's/python3 == 3.14/python3 == 3.11/g' buildozer.spec
          sed -i 's/#python3 == 3.11/python3 == 3.11/g' buildozer.spec
          sed -i 's/#android.permissions =/android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,INTERNET/g' buildozer.spec
          sed -i 's/#icon.filename = .\/icon.png/icon.filename = icon.png/g' buildozer.spec
          sed -i 's/icon.filename = .\/data\/icon.png/icon.filename = icon.png/g' buildozer.spec
        fi

    # استخدام الأكشن المستقر المخصص لبيلدوزر (يتكفل بالجافا، التراخيص، والبيئة بالكامل)
    - name: Build APK with Buildozer Action
      uses: ArtemSsh/buildozer-action@v1
      with:
        workdir: .
        buildozer_version: master

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hussein-AI-Ultimate-APK
        path: bin/*.apk
